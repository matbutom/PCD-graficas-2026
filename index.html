<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>PCD 2026 — Visualizador Generativo</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:ital,wght@0,400;0,700;1,400&family=Syne:wght@700;800&family=Barlow+Condensed:wght@700;800&family=Bebas+Neue&family=Plus+Jakarta+Sans:wght@700;800&family=Epilogue:wght@700;900&family=DM+Sans:wght@700;800&family=Urbanist:wght@700;900&family=Jost:wght@700;900&family=Outfit:wght@700;900&display=swap" rel="stylesheet">

  <!-- Custom Fonts -->
  <style>
    @font-face {
      font-family: 'workfaaad-a';
      src: url('assets/fonts/WorkFaAAD-A.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'workfaaad-b';
      src: url('assets/fonts/WorkFaAAD-B.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
    @font-face {
      font-family: 'Necto Mono';
      src: url('assets/fonts/NectoMono-Regular.otf') format('opentype');
      font-weight: normal;
      font-style: normal;
    }
  </style>

  <!-- p5.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ===== TOOLBAR ===== -->
  <header id="toolbar">
    <div class="tb-left">
      <span class="app-logo">/*PCD 2026</span>
      <span id="fps-display" class="fps-badge">-- fps</span>
      <span id="toolbar-contrast" class="toolbar-contrast pass">[AA ✓] 21.0:1</span>
    </div>
    <div class="tb-center">
      <button id="btn-play-pause" class="btn-tool active">
        <svg viewBox="0 0 24 24" width="12" height="12" fill="currentColor"><path id="play-icon" d="M8 5v14l11-7z"/></svg>
        <span id="play-label">Pause</span>
      </button>
      <button id="btn-reset"  class="btn-tool">Reset</button>
      <button id="btn-guides" class="btn-tool">Guides</button>
    </div>
    <div class="tb-right">
      <button id="btn-export-png" class="btn-tool btn-export">PNG</button>
      <button id="btn-export-mp4" class="btn-tool btn-export">MP4 10s</button>
    </div>
  </header>

  <!-- ===== LAYOUT ===== -->
  <main id="app-layout">

    <!-- ===== SIDEBAR ===== -->
    <aside id="sidebar">
      <div id="sidebar-inner">

        <!-- ——— 0. FORMATO ——— -->
        <details class="section" open>
          <summary class="section-header">
            <span>Formato</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">
            <div class="sub-group">
              <select id="format-select" class="select-input select-full">
                <option value="ig">Instagram — 1080×1350</option>
                <option value="banner">Banner — 1600×400</option>
              </select>
            </div>
            <div class="sub-group" id="poster-slide-controls">
              <div class="sub-label">Slide del poster</div>
              <select id="poster-slide-select" class="select-input select-full">
                <option value="0">0 — Info completa</option>
                <option value="1">1 — Título + Logos</option>
                <option value="2">2 — Info del evento</option>
                <option value="3">3 — Logos centrados</option>
                <option value="4">4 — Hero visual</option>
                <option value="5">5 — ¿Qué buscamos?</option>
              </select>
            </div>
            <div class="sub-group" id="extra-logos-controls">
              <div class="ctrl-row">
                <label>Mostrar logos</label>
                <label class="toggle"><input type="checkbox" id="extra-logos-toggle" checked><span class="track"></span></label>
              </div>
            </div>
            <div class="sub-group" id="convocatoria-tag-controls">
              <div class="ctrl-row">
                <label>Mostrar «Convocatoria abierta»</label>
                <label class="toggle"><input type="checkbox" id="convocatoria-tag-toggle" checked><span class="track"></span></label>
              </div>
            </div>
            <div class="sub-group" id="banner-controls" style="display:none">
              <button id="btn-randomize-banner" class="btn-action" style="width:100%">Randomizar pixeles</button>
            </div>
          </div>
        </details>

        <!-- ——— 1. LAYOUT Y GRILLA ——— -->
        <details class="section" open>
          <summary class="section-header">
            <span>Layout y Grilla</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">

            <div class="sub-group">
              <div class="ctrl-row">
                <label>Margen <span class="val" id="margin-disp">40</span>px</label>
                <input type="range" id="margin-val" min="0" max="120" value="40" class="slider">
              </div>
            </div>

            <div class="sub-group">
              <div class="sub-label-row">
                <span class="sub-label">Grilla</span>
                <label class="toggle"><input type="checkbox" id="grid-show" checked><span class="track"></span></label>
              </div>
              <div class="ctrl-row">
                <label>Columnas <span class="val" id="grid-cols-val">3</span></label>
                <input type="range" id="grid-cols" min="1" max="6" value="3" class="slider">
              </div>
              <div class="ctrl-row">
                <label>Filas <span class="val" id="grid-rows-val">6</span></label>
                <input type="range" id="grid-rows" min="1" max="8" value="6" class="slider">
              </div>
              <div class="ctrl-row">
                <label>Grosor <span class="val" id="grid-weight-val">1.0</span>px</label>
                <input type="range" id="grid-weight" min="1" max="30" value="10" class="slider">
              </div>
            </div>

            <div class="sub-group">
              <div class="ctrl-row">
                <label>Guías de centro</label>
                <label class="toggle"><input type="checkbox" id="guides-toggle"><span class="track"></span></label>
              </div>
            </div>

            <div class="sub-group">
              <div class="sub-label">Módulos de texto</div>
              <div style="display:flex;gap:6px">
                <button id="btn-randomize-layout" class="btn-action" style="flex:1">Randomize</button>
                <button id="btn-reset-layout"     class="btn-action" style="flex:1">Reset</button>
              </div>
            </div>

          </div>
        </details>

        <!-- ——— 1.5. COLORES DEL AFICHE (WCAG) ——— -->
        <details class="section" open>
          <summary class="section-header">
            <span>Colores del afiche</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">

            <div class="sub-group">
              <div class="ctrl-row">
                <label>Color de fondo</label>
                <input type="color" id="poster-bg" value="#ffffff" class="color-input">
              </div>
              <div class="ctrl-row">
                <label>Color texto/grilla</label>
                <input type="color" id="poster-fg" value="#000000" class="color-input">
              </div>
            </div>

            <div class="sub-group">
              <div class="contrast-indicator">
                <span class="contrast-label">Contraste:</span>
                <span id="contrast-ratio-val" class="contrast-ratio-val">21.0:1</span>
                <span id="contrast-badge" class="contrast-badge pass">✓ AA</span>
              </div>
              <div id="contrast-error" class="contrast-error hidden"></div>
            </div>

            <div class="sub-group">
              <div class="sub-label-row">
                <span class="sub-label">Auto-ajustar contraste</span>
                <label class="toggle"><input type="checkbox" id="auto-contrast"><span class="track"></span></label>
              </div>
            </div>

          </div>
        </details>

        <!-- ——— 2. PALETA DE COLOR ——— -->
        <details class="section" open>
          <summary class="section-header">
            <span>Paleta</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">
            <div class="sub-group">
              <div class="sub-label">Paletas accesibles (WCAG AA)</div>
              <div class="wcag-swatches" id="wcag-swatches">
                <!-- Filled by JS -->
              </div>
            </div>
            <div class="sub-group">
              <div class="ctrl-row">
                <label>Texto animación</label>
                <input type="color" id="fg-color" value="#000000" class="color-input">
              </div>
              <div class="ctrl-row">
                <label>Color animación</label>
                <input type="color" id="bubble-bg-color" value="#FF2200" class="color-input">
              </div>
              <div class="ctrl-row">
                <label>Color de fondo</label>
                <input type="color" id="bg-color" value="#ffffff" class="color-input">
              </div>
            </div>
            <div class="sub-group">
              <div class="ctrl-row">
                <label>Opacidad anim <span class="val" id="anim-opacity-val">80</span>%</label>
                <input type="range" id="anim-opacity" min="10" max="100" value="80" class="slider">
              </div>
              <div class="ctrl-row">
                <label>Opacidad grilla <span class="val" id="grid-opacity-val">35</span>%</label>
                <input type="range" id="grid-opacity" min="5" max="80" value="35" class="slider">
              </div>
            </div>
          </div>
        </details>

        <!-- ——— 3. ANIMACIÓN ——— -->
        <details class="section" open>
          <summary class="section-header">
            <span>Animación</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">
            <div class="sub-group">
              <select id="anim-select" class="select-input select-full">
                <option value="letter-physics">Letter Physics</option>
                <option value="particle-network">Particle Network</option>
                <option value="flow-field">Flow Field</option>
                <option value="grid-distortion">Grid Distortion</option>
                <option value="bouncing-shapes">Bouncing Shapes</option>
                <option value="wave-interference">Wave Interference</option>
                <option value="code-rain">Code Rain</option>
                <option value="constellation">Constellation</option>
                <option value="elastic-mesh">Elastic Mesh</option>
                <option value="rotating-typography">Rotating Typography</option>
                <option value="pixel-texture">Pixel Texture</option>
                <option value="glyph-flow-field">Glyph Flow Field</option>
                <option value="slot-drum-typography">Slot Drum Typography</option>
              </select>
              <div class="ctrl-row" style="margin-top:6px">
                <label>Blend mode</label>
                <select id="anim-blend" class="select-input" style="width:110px">
                  <option value="source-over">Normal</option>
                  <option value="screen">Screen</option>
                  <option value="multiply">Multiply</option>
                  <option value="overlay">Overlay</option>
                  <option value="color-dodge">Color Dodge</option>
                  <option value="hard-light">Hard Light</option>
                  <option value="difference">Difference</option>
                  <option value="exclusion">Exclusion</option>
                  <option value="lighten">Lighten</option>
                  <option value="darken">Darken</option>
                </select>
              </div>
              <div class="ctrl-row" style="margin-top:8px">
                <label>Velocidad <span class="val" id="anim-speed-val">2.0</span>x</label>
                <input type="range" id="anim-speed" min="2" max="80" value="20" class="slider">
              </div>
              <div class="ctrl-row">
                <label>Tipografía <span class="val" id="anim-text-size-val">48</span>px</label>
                <input type="range" id="anim-text-size" min="20" max="120" value="48" class="slider">
              </div>
              <div class="ctrl-row" id="slide4-leading-row" style="display:none">
                <label>Interlineado <span class="val" id="slide4-leading-val">0.74</span></label>
                <input type="range" id="slide4-leading" min="30" max="120" value="74" class="slider">
              </div>
              <div class="ctrl-row">
                <label>Semilla</label>
                <div style="display:flex;gap:4px;flex-shrink:0">
                  <input type="number" id="anim-seed" value="42" min="0" max="99999" class="num-input">
                  <button id="btn-randomize-anim" class="btn-sm">↻</button>
                </div>
              </div>
            </div>
          </div>
        </details>

        <!-- ——— 3.5. TIPOGRAFÍA ANIMACIÓN ——— -->
        <details class="section">
          <summary class="section-header">
            <span>Tipografía animación</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">
            <div class="sub-group">
              <div class="sub-label">Fuente del texto</div>
              <select id="anim-font" class="select-input select-full">
                <option value="Space Mono">Space Mono — Mono bold</option>
                <option value="Bebas Neue">Bebas Neue — Ultra condensada</option>
                <option value="Barlow Condensed">Barlow Condensed — Grotesca cond.</option>
                <option value="Syne">Syne — Geométrica extraña</option>
                <option value="Urbanist">Urbanist — Geométrica limpia</option>
                <option value="Outfit">Outfit — Geométrica moderna</option>
                <option value="Epilogue">Epilogue — Grotesca display</option>
                <option value="Plus Jakarta Sans">Plus Jakarta Sans — Geo premium</option>
                <option value="DM Sans">DM Sans — Neutral geométrica</option>
                <option value="Jost">Jost — Futurista geométrica</option>
              </select>
            </div>
          </div>
        </details>

        <!-- ——— 4. EXPORTACIÓN ——— -->
        <details class="section">
          <summary class="section-header">
            <span>Exportación</span>
            <svg class="chevron" viewBox="0 0 24 24" width="12" height="12" fill="none" stroke="currentColor" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>
          </summary>
          <div class="section-body">
            <div class="sub-group">
              <div class="ctrl-row info-row">
                <span class="label-muted">Resolución</span>
                <span class="val-badge" id="res-badge">1080 × 1350 px</span>
              </div>
            </div>
            <div class="sub-group">
              <button id="btn-export-png-sidebar" class="btn-action btn-primary">PNG — frame actual</button>
            </div>
            <div class="sub-group">
              <button id="btn-export-mp4-sidebar" class="btn-action">Video — 10 segundos</button>
              <div id="export-progress" class="export-progress hidden">
                <div class="progress-bar"><div id="progress-fill" class="progress-fill"></div></div>
                <span id="progress-text">Procesando...</span>
              </div>
            </div>
          </div>
        </details>

      </div><!-- /sidebar-inner -->
    </aside>

    <!-- ===== CANVAS ===== -->
    <section id="canvas-area">
      <div id="canvas-wrapper">
        <div id="canvas-container"></div>
      </div>
    </section>

  </main>

  <script src="animations.js"></script>
  <script src="animations-slide4.js"></script>
  <script src="app.js"></script>
</body>
</html>
